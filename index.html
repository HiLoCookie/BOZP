<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOZP Školení – POHAS s.r.o.</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <a href="https://www.pohas.cz/" target="_blank" class="logo-link">
    <img src="/src/logo.png" class="logo" alt="POHAS">
  </a>

  <div class="header-text">
    <h1>BOZP Školení</h1>
    <p>POHAS s.r.o.</p>
  </div>
</header>

<div class="container">

  <section class="card">
    <h2>Prezentace</h2>
    <embed src="/src/prezentace.pdf" width="100%" height="600px" />
  </section>

  <section class="card">
    <h2>Test znalostí</h2>

    <form id="testForm" class="form">

      <div class="form-group">
        <label>Jméno a příjmení</label>
        <input type="text" id="name" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required>
      </div>

      <div class="form-group">
        <label>Společnost</label>
        <select id="company" required>
          <option value="">-- Vyberte společnost --</option>
          <option value="soud">Okresní soud v Teplicích</option>
          <option value="ostatni">Ostatní</option>
        </select>
      </div>

      <label class="gdpr">
        <input type="checkbox" required>
        Beru na vědomí zpracování osobních údajů.
      </label>

      <div id="questions"></div>

      <button type="submit">Odeslat test</button>
    </form>

    <div id="result"></div>
  </section>

</div>

<script src="script.js"></script>

<script>
  const nav = performance.getEntriesByType("navigation")[0];
  if (nav && nav.type === "reload") {
    window.location.href = "/force-logout";
  }
</script>

</body>
</html>
