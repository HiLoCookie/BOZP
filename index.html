<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>BOZP Školení</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>BOZP Školení</h1>

<!-- PowerPoint Embed -->
<embed src="/src/prezentace.pdf" width="100%" height="800px" />

<h2>Test</h2>

<form id="testForm" class="form">

  <div class="form-group">
    <label for="name">Full Name</label>
    <input type="text" id="name" required>
  </div>

  <div class="form-group">
    <label for="email">Email</label>
    <input type="email" id="email" required>
  </div>
  <div>
    <label>Společnost:</label>
      <select id="company" required>
          <option value="">-- Vyberte společnost --</option>
          <option value="POHAS">POHAS s.r.o.</option>
          <option value="ABC">ABC s.r.o.</option>
          <option value="XYZ">XYZ a.s.</option>
      </select>
    </div>

    <label class="gdpr">
      <input type="checkbox" required>
        Beru na vědomí zpracování osobních údajů.
        <a href="gdpr.html" target="_blank">Více informací</a>
    </label>

    <div id="questions"></div>

    <button type="submit">Odeslat test</button>
  </form>

  <div id="result"></div>
</section>

<footer>
  © 2026 POHAS s.r.o.
</footer>

<script src="script.js"></script>
</body>
</html>
